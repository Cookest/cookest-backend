name: "cookest"

services:
  # ── Food API Database ────────────────────────────────────────────────────
  food-db:
    image: postgres:16-alpine
    container_name: cookest_food_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cookest_food
    ports:
      - "5432:5432"
    volumes:
      - food_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cookest_food"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── App API Database ─────────────────────────────────────────────────────
  app-db:
    image: pgvector/pgvector:pg16
    container_name: cookest_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cookest_app
    ports:
      - "5433:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cookest_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3 Object Storage) ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cookest_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-createbucket:
    image: minio/mc:latest
    container_name: cookest_minio_createbucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      /usr/bin/mc mb myminio/cookest-images --ignore-existing &&
      /usr/bin/mc anonymous set public myminio/cookest-images
      "

  # ── Food API ─────────────────────────────────────────────────────────────
  food-api:
    build:
      context: .
      dockerfile: crates/food-api/Dockerfile
    container_name: cookest_food_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8081:8081"
    environment:
      FOOD_DATABASE_URL: postgresql://postgres:postgres@food-db:5432/cookest_food
      FOOD_HOST: 0.0.0.0
      FOOD_PORT: 8081
      FOOD_CORS_ORIGIN: "*"
      RUST_LOG: info,cookest_food_api=debug
    volumes:
      # Drop ingredient/recipe CSV/JSON files here on the host to import them
      # from the admin dashboard (see docs: Seeding the database).
      - ./data/imports:/data/imports
    depends_on:
      food-db:
        condition: service_healthy

  # ── App API ──────────────────────────────────────────────────────────────
  app-api:
    build:
      context: .
      dockerfile: crates/app-api/Dockerfile
    container_name: cookest_app_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_DATABASE_URL: postgresql://postgres:postgres@app-db:5432/cookest_app
      HOST: 0.0.0.0
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-qwen2.5vl:7b}
      # Timeout in seconds for vision inference — increase for slower CPU servers
      OLLAMA_VISION_TIMEOUT_SECS: ${OLLAMA_VISION_TIMEOUT_SECS:-120}
      PDF_UPLOAD_DIR: /data/pdfs
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FOOD_API_URL: http://food-api:8081
      FOOD_API_KEY: ${FOOD_API_KEY:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: cookest-images
      S3_REGION: us-east-1
      S3_PUBLIC_URL: http://localhost:9000/cookest-images
      RUST_LOG: info,cookest_app_api=debug
    volumes:
      - pdf_uploads:/data/pdfs
    depends_on:
      app-db:
        condition: service_healthy
      food-api:
        condition: service_started
      minio:
        condition: service_healthy

volumes:
  food_db_data:
  app_db_data:
  pdf_uploads:
  minio_data:
